<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masonry Maker Support</title>
  <style>
    :root {
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --bg: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Poppins", "Helvetica Neue", Arial, sans-serif;
      line-height: 1.75;
    }

    main {
      width: min(100%, 800px);
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 2.75rem);
      font-weight: 500;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    p {
      margin: 0 0 16px;
      font-size: 1rem;
    }

    .card {
      margin-top: 28px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #ffffff;
    }

    .label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .value {
      margin-bottom: 18px;
      font-size: 1rem;
    }

    a {
      color: inherit;
      word-break: break-word;
    }

    @media (max-width: 640px) {
      main {
        padding: 32px 16px 48px;
      }

      .card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Masonry Maker Support</h1>
    <p>For support inquiries, please contact:</p>

    <section class="card">
      <span class="label">Name</span>
      <p class="value">Yukiko Yamazaki</p>

      <span class="label">Email</span>
      <p class="value">
        <a href="mailto:yukiko-y@mxv.mesh.ne.jp">yukiko-y@mxv.mesh.ne.jp</a>
      </p>

      <span class="label">Response time</span>
      <p class="value">Within 5 business days</p>
    </section>
  </main>
</body>
</html>
